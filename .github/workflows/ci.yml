name: Build Docker and Upload to Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      ref:
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    name: Download HBuilderX

    outputs:
      version: ${{ steps.get-versions.outputs.version }}
      url: ${{ steps.get-versions.outputs.url }}
      should_skip: ${{ steps.get-versions.outputs.should_skip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Get Latest HBuilderX Versions
        id: get-versions
        run: |
          version=$(cat versions.json | jq -r '.[0].version')
          url="$(cat versions.json | jq -r '.[0].url')"
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "url=$url" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin | grep -q "refs/tags/v${version}$"; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Cache HBuilderX tgz
        if: steps.get-versions.outputs.should_skip != 'true'
        id: cache-hbuilderx
        uses: actions/cache@v5
        with:
          key: hbuilderx-${{ steps.get-versions.outputs.version }}
          path: ./.cache/hbuilderx

      - name: Download HBuilderX ${{ steps.get-versions.outputs.version }}
        if: steps.cache-hbuilderx.outputs.cache-hit != 'true' && steps.get-versions.outputs.should_skip != 'true'
        run: |
          wget -O ./hbuilderx.tar.gz ${{ steps.get-versions.outputs.url }}
          mkdir -p ./.cache/hbuilderx
          tar -xzf hbuilderx.tar.gz -C ./.cache/hbuilderx --strip-components=1

  build:
    runs-on: ubuntu-latest

    needs: download
    if: needs.download.outputs.should_skip != 'true'

    strategy:
      fail-fast: true
      matrix:
        slim:
          - true
          - false

    name: Build HBuilderX Docker Image ${{ matrix.slim && '(slim)' || '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache HBuilderX tgz
        id: cache-hbuilderx
        uses: actions/cache@v5
        with:
          key: hbuilderx-${{ needs.download.outputs.version }}
          path: ./.cache/hbuilderx

      - name: Build Docker image for HBuilderX ${{ matrix.slim && 'slim' || 'full' }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t hbuilderx:${{ needs.download.outputs.version }} \
            --build-arg HBUILDERX_PATH=./.cache/hbuilderx \
            --build-arg SLIM=${{ matrix.slim }} \
            --output type=docker,dest=./hbuilderx.${{ needs.download.outputs.version }}${{ matrix.slim && '-slim' || '' }}.tar .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: hbuilderx.${{ needs.download.outputs.version }}${{ matrix.slim && '-slim' || '' }}.tar.zip
          path: ./hbuilderx.${{ needs.download.outputs.version }}${{ matrix.slim && '-slim' || '' }}.tar

  release:
    needs:
      - download
      - build
    if: github.event_name == 'push' && needs.download.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built image
        uses: actions/download-artifact@v6
        with:
          path: .
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./hbuilderx.*.tar
          prerelease: ${{ contains(needs.download.outputs.version, '-alpha') }}
          name: v${{ needs.download.outputs.version }}
          tag_name: v${{ needs.download.outputs.version }}
          target_commitish: ${{ github.sha }}
          body: |
            ## HBuilderX Docker Images

            This release contains Docker images for HBuilderX.

            - hbuilderx.\<version\>.tar: Docker image for HBuilderX Stable version
            - hbuilderx.\<version\>-slim.tar: Slim Docker image for HBuilderX Stable version
            - hbuilderx.\<version\>-alpha.tar: Docker image for HBuilderX Alpha version
            - hbuilderx.\<version\>-alpha-slim.tar: Slim Docker image for HBuilderX Alpha version

            ### Usage

            To load the Docker image, use the following command:

            ```bash
            docker load -i hbuilderx.<version>.tar
            ```

            After loading the image, you can run the container using:
            
            ```bash
            docker run -it hbuilderx:${{ needs.download.outputs.version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
